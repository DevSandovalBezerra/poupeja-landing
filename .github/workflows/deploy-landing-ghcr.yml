name: Build and Push Landing to GHCR

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_LOG_LEVEL=info
            VITE_LOGO_WIDTH=${{ secrets.VITE_LOGO_WIDTH }}
            VITE_LOGO_HEIGHT=${{ secrets.VITE_LOGO_HEIGHT }}
            VITE_SUPPORT_EMAIL=${{ secrets.VITE_SUPPORT_EMAIL }}
            VITE_SUPPORT_WHATSAPP=${{ secrets.VITE_SUPPORT_WHATSAPP }}
            VITE_PLAN_PRICE_MONTHLY=${{ secrets.VITE_PLAN_PRICE_MONTHLY }}
            VITE_PLAN_PRICE_ANNUAL=${{ secrets.VITE_PLAN_PRICE_ANNUAL }}
            VITE_PLAN_FEATURES_MONTHLY=${{ secrets.VITE_PLAN_FEATURES_MONTHLY }}
            VITE_PLAN_FEATURES_ANNUAL=${{ secrets.VITE_PLAN_FEATURES_ANNUAL }}
            VITE_TERMS_URL=${{ secrets.VITE_TERMS_URL }}
            VITE_PRIVACY_URL=${{ secrets.VITE_PRIVACY_URL }}
            VITE_TEMPLATE_VARIANT=${{ secrets.VITE_TEMPLATE_VARIANT }}
          tags: |
            ghcr.io/devsandovalbezerra/poupeja-landing:latest
            ghcr.io/devsandovalbezerra/poupeja-landing:${{ github.sha }}
